<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📝 我们的待办清单</title>

<!-- WeChat / social share preview -->
<meta property="og:title" content="📝 我们的待办清单">
<meta property="og:description" content="一起完成每一件小事 ❤️">
<meta property="og:type" content="website">
<meta property="og:locale" content="zh_CN">
<meta name="description" content="一个轻巧的共享待办清单，把任务发给TA一起完成">

<style>
  :root {
    --bg: #f0f2f5;
    --card: #ffffff;
    --text: #1a1a2e;
    --text-secondary: #6b7280;
    --border: #e5e7eb;
    --primary: #6366f1;
    --primary-hover: #4f46e5;
    --danger: #ef4444;
    --danger-hover: #dc2626;
    --success: #22c55e;
    --pink: #ec4899;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.08), 0 4px 6px -4px rgba(0,0,0,.04);
    --radius: 12px;
    --transition: 0.2s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px 60px;
    line-height: 1.6;
  }

  .app {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* ── Header ──────────────────────────────── */
  .header {
    text-align: center;
    padding: 8px 0;
  }
  .header h1 {
    font-size: 1.9rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--primary), #a855f7, var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .date {
    color: var(--text-secondary);
    font-size: 0.85rem;
    margin-top: 4px;
  }
  .header .shared-badge {
    display: none;
    margin-top: 6px;
    font-size: 0.8rem;
    color: var(--pink);
    background: #fdf2f8;
    border-radius: 20px;
    padding: 3px 12px;
    display: inline-block;
  }
  .header .shared-badge.show { display: inline-block; }

  /* ── Input ────────────────────────────────── */
  .input-group {
    display: flex;
    gap: 8px;
  }
  .input-group input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    font-size: 1rem;
    background: var(--card);
    color: var(--text);
    transition: border-color var(--transition);
    outline: none;
  }
  .input-group input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99,102,241,.15);
  }
  .input-group input::placeholder { color: #9ca3af; }

  .btn {
    padding: 12px 20px;
    border: none;
    border-radius: var(--radius);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary {
    background: var(--primary);
    color: #fff;
  }
  .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  /* ── Toolbar ──────────────────────────────── */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }
  .filters {
    display: flex;
    gap: 4px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 4px;
    box-shadow: var(--shadow);
  }
  .filter-btn {
    padding: 6px 14px;
    border: none;
    background: transparent;
    border-radius: 8px;
    font-size: 0.82rem;
    cursor: pointer;
    color: var(--text-secondary);
    font-weight: 500;
    transition: all var(--transition);
  }
  .filter-btn.active {
    background: var(--primary);
    color: #fff;
  }
  .filter-btn:not(.active):hover { background: var(--bg); color: var(--text); }
  .counter {
    font-size: 0.82rem;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .counter span { color: var(--primary); font-weight: 700; }

  /* ── List ─────────────────────────────────── */
  .todo-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 60px;
  }
  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    transition: all var(--transition);
    animation: slideIn 0.3s ease;
  }
  .todo-item:hover { box-shadow: var(--shadow-lg); }
  .todo-item.completed .todo-text {
    text-decoration: line-through;
    color: #9ca3af;
  }
  .todo-item.removing {
    animation: slideOut 0.25s ease forwards;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideOut {
    from { opacity: 1; transform: translateX(0); }
    to   { opacity: 0; transform: translateX(40px); }
  }

  /* Custom checkbox */
  .checkbox-wrap {
    position: relative;
    width: 22px; height: 22px;
    flex-shrink: 0;
  }
  .checkbox-wrap input {
    opacity: 0; position: absolute;
    width: 100%; height: 100%;
    cursor: pointer; z-index: 2;
  }
  .checkmark {
    position: absolute; inset: 0;
    border: 2px solid #d1d5db;
    border-radius: 6px;
    transition: all var(--transition);
    display: flex; align-items: center; justify-content: center;
  }
  .checkbox-wrap input:checked + .checkmark {
    background: var(--success);
    border-color: var(--success);
  }
  .checkbox-wrap input:checked + .checkmark::after {
    content: "✓"; color: #fff; font-size: 13px; font-weight: 700; line-height: 1;
  }
  .checkbox-wrap input:hover + .checkmark { border-color: var(--success); }

  .todo-text {
    flex: 1; word-break: break-word;
    transition: color var(--transition);
  }

  .btn-delete {
    width: 30px; height: 30px;
    border: none; background: transparent;
    color: #9ca3af; border-radius: 6px;
    cursor: pointer; font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--transition); flex-shrink: 0;
  }
  .btn-delete:hover { background: #fef2f2; color: var(--danger); }

  /* ── Footer ───────────────────────────────── */
  .footer-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    font-size: 0.82rem;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all var(--transition);
    color: var(--text-secondary);
    font-weight: 500;
  }
  .btn-outline:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: #eef2ff;
  }
  .btn-share {
    background: linear-gradient(135deg, var(--primary), #a855f7);
    color: #fff;
    border: none;
    font-size: 0.85rem;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all var(--transition);
    font-weight: 600;
  }
  .btn-share:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,.35); }
  .btn-share:active { transform: translateY(0); }
  .btn-danger {
    background: transparent; color: var(--danger);
    border: 1px solid transparent;
    font-size: 0.82rem; padding: 8px 14px;
    border-radius: 8px; cursor: pointer;
    transition: all var(--transition);
  }
  .btn-danger:hover { background: #fef2f2; border-color: var(--danger); }
  .btn-danger:disabled { color: #d1d5db; cursor: not-allowed; }
  .btn-danger:disabled:hover { background: transparent; border-color: transparent; }

  /* ── Empty state ──────────────────────────── */
  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--text-secondary);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.4; }
  .empty-state p { font-size: 0.95rem; }

  /* ── Toast ────────────────────────────────── */
  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #1f2937; color: #fff;
    padding: 12px 24px; border-radius: 24px;
    font-size: 0.9rem; font-weight: 500;
    z-index: 999; opacity: 0;
    transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,.2);
    text-align: center;
    max-width: 90vw;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast .copy-hint { font-size: 0.72rem; opacity: 0.6; margin-top: 4px; }

  /* ── Share modal ──────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    z-index: 998; display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: auto; }
  .modal-sheet {
    background: #fff; width: 100%; max-width: 520px;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 36px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 -4px 24px rgba(0,0,0,.1);
  }
  .modal-overlay.show .modal-sheet { transform: translateY(0); }
  .modal-sheet h3 {
    text-align: center; font-size: 1.1rem;
    margin-bottom: 16px; color: var(--text);
  }
  .modal-sheet .task-preview {
    background: var(--bg); border-radius: var(--radius);
    padding: 14px 16px; margin-bottom: 16px;
    max-height: 160px; overflow-y: auto;
    font-size: 0.88rem; list-style: none;
  }
  .modal-sheet .task-preview li {
    padding: 4px 0; color: var(--text-secondary);
  }
  .modal-sheet .task-preview li::before { content: "☐ "; color: #9ca3af; }
  .modal-sheet .actions {
    display: flex; gap: 8px;
  }
  .modal-sheet .actions button {
    flex: 1; padding: 12px; border-radius: var(--radius);
    font-size: 0.9rem; font-weight: 600; cursor: pointer;
    border: none; transition: all var(--transition);
  }
  .modal-sheet .btn-copy {
    background: var(--primary); color: #fff;
  }
  .modal-sheet .btn-copy:hover { background: var(--primary-hover); }
  .modal-sheet .btn-cancel {
    background: var(--bg); color: var(--text-secondary);
  }
  .modal-sheet .btn-cancel:hover { background: var(--border); }

  /* ── Responsive ───────────────────────────── */
  @media (max-width: 400px) {
    body { padding: 20px 8px 60px; }
    .header h1 { font-size: 1.5rem; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .filters { justify-content: center; }
    .counter { text-align: center; }
  }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <h1>📝 我们的待办清单</h1>
    <p class="date" id="dateDisplay"></p>
    <span class="shared-badge" id="sharedBadge">💌 来自TA分享的清单</span>
  </header>

  <div class="input-group">
    <input type="text" id="todoInput" placeholder="写下一件要做的事…" maxlength="200" autocomplete="off">
    <button class="btn btn-primary" id="addBtn">添加</button>
  </div>

  <div class="toolbar">
    <div class="filters">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="active">待完成</button>
      <button class="filter-btn" data-filter="completed">已完成</button>
    </div>
    <p class="counter" id="counter"></p>
  </div>

  <ul class="todo-list" id="todoList"></ul>

  <div class="footer-actions">
    <button class="btn-share" id="shareBtn" title="分享给微信好友">📤 分享给TA</button>
    <button class="btn-danger" id="clearCompleted" disabled>清除已完成</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Share bottom sheet -->
<div class="modal-overlay" id="shareModal">
  <div class="modal-sheet">
    <h3>📤 分享待办清单</h3>
    <p style="text-align:center;font-size:0.85rem;color:var(--text-secondary);margin-bottom:12px;">
      链接已包含当前所有待办事项
    </p>
    <ul class="task-preview" id="taskPreview"></ul>
    <div class="actions">
      <button class="btn-cancel" id="cancelShare">取消</button>
      <button class="btn-copy" id="copyLink">📋 复制链接</button>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ── State ──────────────────────────────────────
  const STORAGE_KEY = "todo_app_tasks_v2";
  let tasks    = [];
  let filter   = "all";
  let isShared = false;   // true if loaded from a shared link

  // ── DOM refs ───────────────────────────────────
  const input          = document.getElementById("todoInput");
  const addBtn         = document.getElementById("addBtn");
  const list           = document.getElementById("todoList");
  const counter        = document.getElementById("counter");
  const clearCompleted = document.getElementById("clearCompleted");
  const dateDisplay    = document.getElementById("dateDisplay");
  const filterBtns     = document.querySelectorAll(".filter-btn");
  const shareBtn       = document.getElementById("shareBtn");
  const sharedBadge    = document.getElementById("sharedBadge");
  const toast          = document.getElementById("toast");
  const shareModal     = document.getElementById("shareModal");
  const taskPreview    = document.getElementById("taskPreview");
  const cancelShare    = document.getElementById("cancelShare");
  const copyLink       = document.getElementById("copyLink");

  // ── Persistence ────────────────────────────────
  function loadTasks() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (_) { return []; }
  }
  function saveTasks() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  }

  // ── URL share codec ────────────────────────────
  // Encode tasks[] → compact string → base64url
  function encodeTasks(list) {
    // Only store text + done, keep it minimal
    const compact = list.map(t => ({ t: t.text, d: t.done ? 1 : 0 }));
    try {
      return btoa(unescape(encodeURIComponent(JSON.stringify(compact))))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    } catch (_) { return ''; }
  }

  function decodeTasks(str) {
    try {
      // Restore base64 padding
      let b64 = str.replace(/-/g, '+').replace(/_/g, '/');
      while (b64.length % 4) b64 += '=';
      const json = decodeURIComponent(escape(atob(b64)));
      const arr = JSON.parse(json);
      if (!Array.isArray(arr)) return null;
      return arr.map(item => ({
        id: uid(),
        text: String(item.t || item.text || ''),
        done: !!(item.d || item.done)
      }));
    } catch (_) { return null; }
  }

  function getSharedFromURL() {
    const p = new URLSearchParams(window.location.search);
    return p.get('list') || null;
  }

  function buildShareURL(list) {
    const encoded = encodeTasks(list);
    const url = new URL(window.location.href);
    url.search = ''; // clear all params
    url.searchParams.set('list', encoded);
    return url.toString();
  }

  // ── Helpers ────────────────────────────────────
  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  function getFiltered() {
    if (filter === "active")    return tasks.filter(t => !t.done);
    if (filter === "completed") return tasks.filter(t => t.done);
    return tasks;
  }

  const remaining = () => tasks.filter(t => !t.done).length;

  // ── Toast ──────────────────────────────────────
  let toastTimer;
  function showToast(msg, sub) {
    clearTimeout(toastTimer);
    toast.innerHTML = msg + (sub ? `<div class="copy-hint">${sub}</div>` : '');
    toast.classList.add("show");
    toastTimer = setTimeout(() => toast.classList.remove("show"), 2200);
  }

  // ── Render ─────────────────────────────────────
  function render() {
    const filtered = getFiltered();
    const left = remaining();

    counter.innerHTML = left === 0
      ? "🎉 全部完成！"
      : `还剩 <span>${left}</span> 项`;

    clearCompleted.disabled = !tasks.some(t => t.done);

    if (filtered.length === 0) {
      const msgs = {
        all:       { icon: "📋", text: "还没有任务，快添加一个吧！" },
        active:    { icon: "✅", text: "所有任务都完成啦！" },
        completed: { icon: "📭", text: "还没有已完成的任务" },
      };
      const m = msgs[filter];
      list.innerHTML = `<li class="empty-state"><div class="icon">${m.icon}</div><p>${m.text}</p></li>`;
    } else {
      list.innerHTML = filtered.map(t => `
        <li class="todo-item${t.done ? " completed" : ""}" data-id="${t.id}">
          <label class="checkbox-wrap">
            <input type="checkbox" ${t.done ? "checked" : ""} data-action="toggle">
            <span class="checkmark"></span>
          </label>
          <span class="todo-text">${escapeHTML(t.text)}</span>
          <button class="btn-delete" data-action="delete" title="删除">🗑</button>
        </li>
      `).join("");
    }

    sharedBadge.classList.toggle("show", isShared);
  }

  function escapeHTML(str) {
    const el = document.createElement("span");
    el.textContent = str;
    return el.innerHTML;
  }

  function refresh() {
    saveTasks();
    render();
  }

  // ── Actions ────────────────────────────────────
  function addTask(text) {
    const trimmed = text.trim();
    if (!trimmed) return;
    tasks.unshift({ id: uid(), text: trimmed, done: false });
    input.value = "";
    refresh();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; }
    refresh();
  }

  function deleteTask(id) {
    const idx = tasks.findIndex(t => t.id === id);
    if (idx === -1) return;
    const el = list.querySelector(`[data-id="${id}"]`);
    if (el) {
      el.classList.add("removing");
      el.addEventListener("animationend", () => {
        tasks.splice(idx, 1);
        refresh();
      }, { once: true });
    } else {
      tasks.splice(idx, 1);
      refresh();
    }
  }

  function clearAllCompleted() {
    tasks = tasks.filter(t => !t.done);
    refresh();
  }

  function setFilter(f) {
    filter = f;
    filterBtns.forEach(b => b.classList.toggle("active", b.dataset.filter === f));
    render();
  }

  // ── Share ──────────────────────────────────────
  function openShareModal() {
    if (tasks.length === 0) {
      showToast("😅 还没有任务哦，先添加几项吧！");
      return;
    }
    // Preview — show only active tasks in the preview
    const active = tasks.filter(t => !t.done);
    taskPreview.innerHTML = active.length > 0
      ? active.map(t => `<li>${escapeHTML(t.text)}</li>`).join("")
      : tasks.map(t => `<li>${escapeHTML(t.text)}</li>`).join("");
    shareModal.classList.add("show");
  }

  function closeShareModal() {
    shareModal.classList.remove("show");
  }

  async function doCopyLink() {
    const url = buildShareURL(tasks);
    try {
      await navigator.clipboard.writeText(url);
      showToast("✅ 链接已复制！", "粘贴到微信发给TA吧");
    } catch (_) {
      // fallback: show the URL for manual copy
      showToast("📋 请手动复制链接", url);
      // Also try old-school method
      const ta = document.createElement("textarea");
      ta.value = url; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }
    closeShareModal();
  }

  // ── Event binding ──────────────────────────────
  list.addEventListener("click", e => {
    const item = e.target.closest(".todo-item");
    if (!item) return;
    const id = item.dataset.id;
    const action = e.target.closest("[data-action]")?.dataset.action;
    if (action === "toggle") toggleTask(id);
    if (action === "delete") deleteTask(id);
  });

  list.addEventListener("change", e => {
    if (e.target.dataset.action === "toggle") {
      const id = e.target.closest(".todo-item")?.dataset.id;
      if (id) toggleTask(id);
    }
  });

  addBtn.addEventListener("click", () => addTask(input.value));
  input.addEventListener("keydown", e => {
    if (e.key === "Enter") addTask(input.value);
  });

  clearCompleted.addEventListener("click", clearAllCompleted);
  shareBtn.addEventListener("click", openShareModal);
  cancelShare.addEventListener("click", closeShareModal);
  copyLink.addEventListener("click", doCopyLink);
  shareModal.addEventListener("click", e => {
    if (e.target === shareModal) closeShareModal();
  });

  filterBtns.forEach(b => {
    b.addEventListener("click", () => setFilter(b.dataset.filter));
  });

  // ── Date display ───────────────────────────────
  function updateDate() {
    const now = new Date();
    const weekDays = ["日","一","二","三","四","五","六"];
    dateDisplay.textContent =
      `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${weekDays[now.getDay()]}`;
  }

  // ── Init ───────────────────────────────────────
  function init() {
    // 1. Check URL for shared data
    const sharedStr = getSharedFromURL();
    const sharedTasks = sharedStr ? decodeTasks(sharedStr) : null;

    if (sharedTasks && sharedTasks.length > 0) {
      // Merge: shared tasks replace local ones (user intentionally opened the link)
      tasks = sharedTasks;
      isShared = true;
      saveTasks();

      // Clean URL (remove the list param for a cleaner look)
      if (window.history && window.history.replaceState) {
        const clean = new URL(window.location.href);
        clean.searchParams.delete("list");
        window.history.replaceState({}, "", clean.toString());
      }
    } else {
      // Load from localStorage
      tasks = loadTasks();
      isShared = false;
    }

    render();
    updateDate();
  }

  init();
})();
</script>
